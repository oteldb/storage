version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: daily
    ignore:
      # prometheus v0.313 changed web/api/v1.NewAPI. The newest published prometheusreceiver
      # (v0.156.0) still calls the old signature, so bumping past v0.312 breaks oteldb, this
      # library's primary embedder. Drop this once prometheusreceiver supports v0.313+.
      - dependency-name: "github.com/prometheus/prometheus"
        versions: [">=0.313.0"]
    groups:
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/otel"
          - "go.opentelemetry.io/otel/*"
          - "go.opentelemetry.io/contrib/*"
      opentelemetry-collector:
        patterns:
          - "go.opentelemetry.io/collector/*"
          - "github.com/open-telemetry/opentelemetry-collector-contrib/*"
      golang:
        patterns:
          - "golang.org/x/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily

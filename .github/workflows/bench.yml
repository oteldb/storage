name: bench

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# One run per PR; cancel superseded runs.
concurrency:
  group: bench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # The definitive golden set (golden_bench_test.go) and the run flags. -count gives benchstat
  # several samples per benchmark so it can judge significance; -benchtime bounds wall time.
  BENCH: '^BenchmarkGolden$'
  FLAGS: '-run=^$ -benchmem -benchtime=300ms -count=6 -timeout=30m'

jobs:
  golden:
    runs-on: [Linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # need the base commit to benchmark it too

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Build the report generator from THIS PR's code now (before the tree is switched to the base
      # commit, which may not have the tool) and stash the binary outside the repo.
      - name: Build report tool
        run: go build -o "${RUNNER_TEMP}/benchreport" ./internal/cmd/benchreport

      - name: Benchmark PR head
        run: go test ${FLAGS} -bench "${BENCH}" ./ | tee head.txt

      # Run the SAME golden benchmark file against the base commit's library code, by copying this
      # PR's golden_bench_test.go onto a checkout of the base SHA. The golden set is self-contained,
      # so it compiles standalone. Non-fatal: if the base can't build the set, we show head only.
      - name: Benchmark base
        id: base
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          cp golden_bench_test.go "${RUNNER_TEMP}/golden_bench_test.go"
          git checkout --quiet --force ${{ github.event.pull_request.base.sha }}
          cp "${RUNNER_TEMP}/golden_bench_test.go" golden_bench_test.go
          go test ${FLAGS} -bench "${BENCH}" ./ | tee base.txt

      - name: Build report
        run: |
          if [ -s base.txt ]; then
            benchstat -format csv base.txt head.txt > bench.csv
            benchstat base.txt head.txt > bench.txt
          else
            benchstat -format csv head.txt > bench.csv
            benchstat head.txt > bench.txt
          fi
          "${RUNNER_TEMP}/benchreport" -raw bench.txt < bench.csv > report.md
          cat report.md

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: golden-bench
          path: |
            head.txt
            base.txt
            bench.csv
            bench.txt
            report.md
          if-no-files-found: warn

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- golden-bench -->';
            const body = fs.readFileSync('report.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

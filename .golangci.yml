version: "2"
linters:
  default: all
  disable:
    # Superseded / not applicable.
    - wsl # superseded by wsl_v5 (also disabled below)
    - gomodguard # superseded by gomodguard_v2
    - depguard # no import allowlist maintained for this library
    # Style linters that fight this codebase's deliberate conventions.
    - wsl_v5 # pedantic cuddle/whitespace rules; not the house style
    - nlreturn # requires a blank line before every return; too noisy
    - varnamelen # short names (i, w, r, b, v, m) are idiomatic in hot loops
    - godox # TODO/FIXME markers are intentional milestone (M1/M3) trackers
    # Inappropriate for a low-level, zero-alloc codec library.
    - mnd # bit widths, masks, and codec constants are inherently "magic"
    - exhaustruct # fights Go's zero-value idiom (sync.Pool scratch, decoders)
    - gochecknoglobals # package-level sync.Pool instances are idiomatic here
    - gochecknoinits # init() wires sync.Pool to satisfy the noCopy vet check
    - forcetypeassert # pool.Get().(*T) is provably safe; checking adds noise
    - noinlineerr # `if err := f(); err != nil` is idiomatic Go
    - ireturn # encoders/decoders legitimately return interfaces
    - wrapcheck # error wrapping is governed by go-faster/errors conventions
    - funlen # codec encode/decode bodies are long but cohesive
    - cyclop # codecs are inherently branchy; complexity caps fight them
    - gocyclo # same rationale as cyclop
    - nonamedreturns # named returns document multi-value codec signatures
    - testpackage # tests are white-box (assert on unexported codec internals)
  enable:
    - dogsled
    - errcheck
    - goconst
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - whitespace
    - gomodguard_v2
  settings:
    dupl:
      threshold: 120
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        # Opinionated checks that fight intentional choices here:
        - hugeParam # Options is passed by value into the functional-options constructor
        - unnamedResult # multi-value codec helpers read fine without named results
    exhaustive:
      # A switch with an explicit default is considered exhaustive: codec/kind
      # subset-switches legitimately handle a few enum values and error on the rest.
      default-signifies-exhaustive: true
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        # Integer-conversion overflow: deliberate and bounds-checked in codec
        # paths (row ids, bit widths, varint lengths); flagging every cast is noise.
        - G115
        # Slice-bounds: hand-written binary parsers bounds-check every length before
        # slicing and are fuzzed for no-panic; G602 can't see the invariant.
        - G602
    lll:
      line-length: 140
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      # Test/bench helpers idiomatically take *testing.{T,B} first; forcing context.Context to be
      # the first parameter fights that convention. (Excluded by text so the rest of revive — incl.
      # dot-import — stays active; a revive `rules:` block would replace the whole default set.)
      - linters:
          - revive
        text: context-as-argument
      - linters:
          - dupl
          - errcheck
          - funlen
          - gocognit
          - goconst
          - gocyclo
          - gosec
          - lll
          - scopelint
          - unparam
        path: _test\.go
      - linters:
          - gocritic
        path: _test\.go
        text: Combine
      - linters:
          - gocritic
        path: _test\.go
        text: dupArg
        source: (assert|require).+Equal
      # internal/cmd/* are developer-run CLI tools, not the library surface: launching
      # `go test` as a subprocess (G204), opening discovered test files (G304), and
      # picking a random fuzz target with math/rand (G404) are inherent to the tool, not
      # untrusted-input risks.
      - linters:
          - gosec
        path: internal/cmd/
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/oteldb/storage
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
